# shake-skills / registry.yml
# ─────────────────────────────────────────────────────────────
# 所有 skill 的單一真相來源。
#
# platforms 欄位說明：
#   universal    → 任何 AI agent 皆可使用（純 prompt / context）
#   claude-code  → Claude Code CLI 的 SKILL.md 格式
#   openclaw     → 依賴 openclaw runtime / browser profile
#   cursor       → Cursor IDE 內使用
#   codex        → OpenAI Codex CLI
#
# source 欄位說明：
#   clawhub  → 從 clawhub 安裝（clawhub install <slug>）
#   local    → 本 repo 自維護，不從 clawhub 拉
#
# 新裝置安裝流程：
#   1. git clone https://github.com/imSHOW1024/shake-skills
#   2. 依對應 profile（profiles/ 目錄）決定要裝哪些 skill
#   3. clawhub skill → clawhub install <slug>
#   4. local skill → 路徑直接指向 clone 目錄

skills:

  # ── Universal（任何 agent 皆可用）────────────────────────
  - slug: copywriting
    source: clawhub
    platforms: [universal]

  - slug: csv
    source: clawhub
    platforms: [universal]

  - slug: data-analysis
    source: clawhub
    platforms: [universal]

  - slug: summarize
    source: clawhub
    platforms: [universal]

  - slug: social-content
    source: clawhub
    platforms: [universal]

  - slug: product-marketing-context
    source: clawhub
    platforms: [universal]

  - slug: multi-search-engine
    source: clawhub
    platforms: [universal]

  - slug: notion
    source: clawhub
    platforms: [universal]

  - slug: pdf-text-extractor
    source: clawhub
    platforms: [universal]

  - slug: excel-xlsx
    source: clawhub
    platforms: [universal]

  - slug: internal-comms
    source: local
    path: skills/internal-comms
    platforms: [universal]

  - slug: brand-guidelines
    source: local
    path: skills/brand-guidelines
    platforms: [universal]

  # ── Claude Code ───────────────────────────────────────────
  - slug: diagram-generator
    source: clawhub
    platforms: [claude-code]

  - slug: brave-search
