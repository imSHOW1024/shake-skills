name: lecture-transcribe
version: "3.0.1"
description: |
  錄音 → 摘要 → Notion 自動化 Pipeline
  支援: EMBA 課堂 / 商務會談 (小型/中型/大型跨部門)
  轉錄: mlx-whisper (主) → WhisperX (備) → openai-whisper (兜底)
  Diarization: pyannote standalone
  摘要: LLM (Claude/GPT/Gemini, 可指定)

trigger:
  type: telegram_audio
  file_types:
    - audio/mpeg
    - audio/mp4
    - audio/ogg
    - audio/wav
    - audio/flac
    - audio/x-m4a
    - video/mp4
  multi_file_window_sec: 600

env_required:
  - NOTION_API_KEY
env_optional:
  - HF_TOKEN
  - ANTHROPIC_API_KEY
  - TORCH_FORCE_NO_WEIGHTS_ONLY_LOAD

python_env: ~/whisperx-env
entry_point: lecture_pipeline.handle_audio_message

files:
  - lecture_pipeline.py
  - transcribe.py
  - summary_prompts.py
  - notion_upload.py
  - course_schedule.yaml
