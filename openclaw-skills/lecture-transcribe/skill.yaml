name: lecture-transcribe
version: "3.0"
description: |
  錄音 → 轉錄 → LLM 摘要 → Notion。
  雙 DB: EMBA課堂 / 商務會談。
  四種摘要模板: 小型(A) / 中型(B) / 大型跨部門(C) / 課堂(D)。
  三層 fallback: mlx-whisper → WhisperX → openai-whisper。
  Speaker 兩階段識別 + 長音訊切割 + 多段合併。

trigger:
  type: telegram_audio
  file_types: [audio/mpeg, audio/mp4, audio/ogg, audio/wav, audio/flac, audio/x-m4a, video/mp4]

env_required:
  - NOTION_API_KEY
env_optional:
  - HF_TOKEN

python_env: ~/whisperx-env
entry_point: lecture_pipeline.handle_audio_message

modules:
  - lecture_pipeline.py
  - transcribe.py
  - prompts.py
  - notion_upload.py
  - course_schedule.py
  - course_schedule.yaml
