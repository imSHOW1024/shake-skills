# ============================================================
# OpenClaw Skill: lecture-transcribe
# 觸發: Telegram Bot 收到語音/音訊檔案
# ============================================================
#
# 目錄結構 (放在 ~/openclaw-skills/lecture-transcribe/):
#
#   lecture-transcribe/
#   ├── skill.yaml              ← 本檔 (技能定義)
#   ├── lecture_pipeline.py     ← 主邏輯
#   ├── course_schedule.yaml    ← EMBA 課表
#   └── requirements.txt        ← Python 依賴
#
# ============================================================

name: lecture-transcribe
description: |
  EMBA 課堂錄音自動轉錄。
  收到音訊檔 → WhisperX 轉錄 + Diarization → 辨識主講者 →
  互動補充 metadata → Markdown 輸出 → 上傳 Notion 課堂摘要庫。

trigger:
  type: telegram_audio
  # 觸發條件: 收到語音訊息或音訊檔案
  file_types:
    - audio/mpeg        # mp3
    - audio/mp4         # m4a
    - audio/ogg         # ogg (Telegram voice message)
    - audio/wav
    - audio/flac
    - audio/x-m4a
    - video/mp4         # 有時錄影檔也需要轉錄

env_required:
  - HF_TOKEN           # HuggingFace (pyannote diarization)
  - NOTION_TOKEN       # Notion API

python_env: ~/whisperx-env
# 使用 install_whisperx.sh 建立的虛擬環境

entry_point: lecture_pipeline.handle_audio_message

